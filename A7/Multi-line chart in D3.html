<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Multi-line chart in D3</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-svg-legend@2.25.6/d3-legend.min.js"></script>
</head>
<body>
    <h1>2026 Chinese Grand Prix</h1>
    <h3>Multi-line Chart: Race position by lap for the top six finishers</h3>
    <svg id="chart"></svg>
    <div id="tooltip" style="position:absolute;pointer-events:none;background:#111;color:#fff;padding:6px 8px;border-radius:4px;opacity:0;font-size:12px;"></div>

    <script>
        // References: D3 documentation https://d3js.org/ and d3-legend https://d3-legend.susielu.com/
        const width = 1180;
        const height = 700;
        const margin = { top: 70, right: 220, bottom: 60, left: 90 };

        const svg = d3.select("#chart")
            .attr("width", width)
            .attr("height", height);

        const chart = svg.append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

        const innerWidth = width - margin.left - margin.right;
        const innerHeight = height - margin.top - margin.bottom;
        const tooltip = d3.select("#tooltip");

        d3.csv("chinese_2026_lap_positions.csv", (d) => ({
            Driver: d.Driver,
            Team: d.Team,
            LapNumber: +d.LapNumber,
            Position: +d.Position,
            FinalPosition: +d.FinalPosition,
            LapTimeSec: +d.LapTimeSec,
            Compound: d.Compound,
            TyreLife: +d.TyreLife
        })).then((data) => {
            const rows = data
                .filter((d) => Number.isFinite(d.LapNumber) && Number.isFinite(d.Position) && Number.isFinite(d.FinalPosition) && d.FinalPosition <= 6)
                .sort((a, b) => d3.ascending(a.LapNumber, b.LapNumber));

            const finalOrder = new Map(
                Array.from(
                    d3.rollup(rows, (values) => d3.min(values, (d) => d.FinalPosition), (d) => d.Driver),
                    ([driver, finalPosition]) => [driver, finalPosition]
                )
            );

            const drivers = [...new Set(rows.map((d) => d.Driver))].sort((a, b) => d3.ascending(finalOrder.get(a), finalOrder.get(b)));

            const series = d3.groups(rows, (d) => d.Driver).map(([driver, values]) => ({
                driver,
                values: values.sort((a, b) => d3.ascending(a.LapNumber, b.LapNumber))
            })).sort((a, b) => d3.ascending(finalOrder.get(a.driver), finalOrder.get(b.driver)));

            const x = d3.scaleLinear()
                .domain(d3.extent(rows, (d) => d.LapNumber))
                .nice()
                .range([0, innerWidth]);

            const y = d3.scaleLinear()
                .domain([d3.max(rows, (d) => d.Position), 1])
                .nice()
                .range([innerHeight, 0]);

            const color = d3.scaleOrdinal()
                .domain(drivers)
                .range(d3.schemeSet1.slice(0, drivers.length));

            chart.append("g")
                .attr("transform", `translate(0,${innerHeight})`)
                .call(d3.axisBottom(x).ticks(12).tickFormat(d3.format("d")));

            chart.append("g")
                .call(d3.axisLeft(y).ticks(10).tickFormat(d3.format("d")));

            chart.append("text")
                .attr("x", innerWidth / 2)
                .attr("y", innerHeight + 42)
                .attr("text-anchor", "middle")
                .attr("font-size", "14px")
                .text("Lap number");

            chart.append("text")
                .attr("transform", "rotate(-90)")
                .attr("x", -innerHeight / 2)
                .attr("y", -58)
                .attr("text-anchor", "middle")
                .attr("font-size", "14px")
                .text("Race position");

            const line = d3.line()
                .curve(d3.curveStepAfter)
                .x((d) => x(d.LapNumber))
                .y((d) => y(d.Position));

            chart.selectAll(".driver-line")
                .data(series)
                .enter()
                .append("path")
                .attr("class", "driver-line")
                .attr("fill", "none")
                .attr("stroke", (d) => color(d.driver))
                .attr("stroke-width", 2.5)
                .attr("d", (d) => line(d.values));

            chart.selectAll(".point-group")
                .data(series)
                .enter()
                .append("g")
                .selectAll("circle")
                .data((d) => d.values)
                .enter()
                .append("circle")
                .attr("cx", (d) => x(d.LapNumber))
                .attr("cy", (d) => y(d.Position))
                .attr("r", 3.2)
                .attr("fill", (d) => color(d.Driver))
                .on("mouseenter", (event, d) => {
                    tooltip.style("opacity", 1)
                        .html(`<strong>${d.Driver}</strong><br/>${d.Team}<br/>Lap ${d.LapNumber}<br/>Position: P${d.Position}<br/>Compound: ${d.Compound}<br/>Tyre life: ${Number.isFinite(d.TyreLife) ? d.TyreLife.toFixed(0) : "N/A"} laps<br/>Lap time: ${Number.isFinite(d.LapTimeSec) ? `${d.LapTimeSec.toFixed(3)} s` : "N/A"}`);
                })
                .on("mousemove", (event) => {
                    tooltip.style("left", `${event.pageX + 10}px`)
                        .style("top", `${event.pageY + 10}px`);
                })
                .on("mouseleave", () => tooltip.style("opacity", 0));

            const legend = d3.legendColor()
                .scale(color)
                .title("Top six finishers")
                .shapeWidth(28)
                .shapeHeight(10)
                .shapePadding(8);

            svg.append("g")
                .attr("transform", `translate(${width - 190}, ${margin.top + 10})`)
                .call(legend);
        });
    </script>
</body>
</html>
