<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Diverging bar chart in D3</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-svg-legend@2.25.6/d3-legend.min.js"></script>
    <style>
        body {
            font-family: "Trebuchet MS", Arial, sans-serif;
            padding: 16px;
            background: #f7f9fc;
            color: #1f2933;
        }
        .axis-title {
            font-size: 14px;
            font-weight: 600;
            fill: #1f2933;
        }
        .note {
            color: #52606d;
            margin-top: -8px;
            margin-bottom: 14px;
        }
        .tooltip {
            position: absolute;
            pointer-events: none;
            background: #102a43;
            color: #ffffff;
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 13px;
            opacity: 0;
        }
    </style>
</head>
<body>
    <h1>2026 Australian Grand Prix</h1>
    <h3>Diverging Bar Chart: Positions gained or lost from the starting grid</h3>
    <p class="note">Positive values mean a driver finished ahead of their grid spot. ColorBrewer palette used: BrBG.</p>
    <svg id="chart"></svg>
    <div id="tooltip" class="tooltip"></div>

    <script>
        // References: D3 documentation https://d3js.org/ and d3-legend https://d3-legend.susielu.com/
        const width = 1120;
        const height = 760;
        const margin = { top: 70, right: 170, bottom: 60, left: 130 };

        const svg = d3.select("#chart")
            .attr("width", width)
            .attr("height", height);

        const chart = svg.append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

        const innerWidth = width - margin.left - margin.right;
        const innerHeight = height - margin.top - margin.bottom;
        const tooltip = d3.select("#tooltip");

        d3.csv("australia_2026_driver_summary.csv", (d) => ({
            Driver: d.Driver,
            Team: d.Team,
            GridPosition: +d.GridPosition,
            Position: +d.Position,
            PositionsGained: +d.PositionsGained
        })).then((data) => {
            const rows = data
                .filter((d) => Number.isFinite(d.PositionsGained))
                .sort((a, b) => d3.descending(a.PositionsGained, b.PositionsGained));

            const maxAbs = d3.max(rows, (d) => Math.abs(d.PositionsGained));

            const x = d3.scaleLinear()
                .domain([-maxAbs, maxAbs])
                .nice()
                .range([0, innerWidth]);

            const y = d3.scaleBand()
                .domain(rows.map((d) => d.Driver))
                .range([0, innerHeight])
                .padding(0.18);

            const color = d3.scaleDiverging()
                .domain([-maxAbs, 0, maxAbs])
                .interpolator(d3.interpolateBrBG);

            chart.append("g")
                .call(d3.axisLeft(y));

            chart.append("g")
                .attr("transform", `translate(0,${innerHeight})`)
                .call(d3.axisBottom(x).ticks(9));

            chart.append("line")
                .attr("x1", x(0))
                .attr("x2", x(0))
                .attr("y1", 0)
                .attr("y2", innerHeight)
                .attr("stroke", "#7b8794")
                .attr("stroke-dasharray", "4 3");

            chart.append("text")
                .attr("class", "axis-title")
                .attr("x", innerWidth / 2)
                .attr("y", innerHeight + 42)
                .attr("text-anchor", "middle")
                .text("Positions gained (+) or lost (-)");

            chart.append("text")
                .attr("class", "axis-title")
                .attr("transform", "rotate(-90)")
                .attr("x", -innerHeight / 2)
                .attr("y", -98)
                .attr("text-anchor", "middle")
                .text("Driver");

            chart.selectAll(".bar")
                .data(rows)
                .enter()
                .append("rect")
                .attr("class", "bar")
                .attr("x", (d) => x(Math.min(0, d.PositionsGained)))
                .attr("y", (d) => y(d.Driver))
                .attr("width", (d) => Math.abs(x(d.PositionsGained) - x(0)))
                .attr("height", y.bandwidth())
                .attr("fill", (d) => color(d.PositionsGained))
                .on("mouseenter", (event, d) => {
                    tooltip.style("opacity", 1)
                        .html(`<strong>${d.Driver}</strong><br/>${d.Team}<br/>Grid: P${d.GridPosition}<br/>Finish: P${d.Position}<br/>Change: ${d.PositionsGained > 0 ? "+" : ""}${d.PositionsGained}`);
                })
                .on("mousemove", (event) => {
                    tooltip.style("left", `${event.pageX + 10}px`)
                        .style("top", `${event.pageY + 10}px`);
                })
                .on("mouseleave", () => tooltip.style("opacity", 0));

            chart.selectAll(".value-label")
                .data(rows)
                .enter()
                .append("text")
                .attr("x", (d) => d.PositionsGained >= 0 ? x(d.PositionsGained) + 6 : x(d.PositionsGained) - 8)
                .attr("y", (d) => y(d.Driver) + y.bandwidth() / 2 + 4)
                .attr("text-anchor", (d) => d.PositionsGained >= 0 ? "start" : "end")
                .attr("font-size", "12px")
                .attr("fill", "#243b53")
                .text((d) => `${d.PositionsGained > 0 ? "+" : ""}${d.PositionsGained}`);

            const legend = d3.legendColor()
                .scale(color)
                .title("Grid-to-finish change")
                .shapeWidth(44)
                .cells(7)
                .orient("vertical")
                .labelFormat(d3.format("d"));

            svg.append("g")
                .attr("transform", `translate(${width - 130}, ${margin.top + 10})`)
                .call(legend);
        });
    </script>
</body>
</html>
